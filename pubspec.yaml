name: spiritual_city
description: A prozedural 2D-Top-Down Open World Game with a spiritual twist.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Game Engine
  flame: ^1.11.0
  flame_audio: ^2.1.0
  flame_noise: ^0.2.0
  
  # State Management & DI
  get_it: ^7.6.0
  provider: ^6.0.5
  
  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Navigation & Logging
  go_router: ^12.0.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
